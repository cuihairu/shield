name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release

jobs:
  # 代码质量检查
  code-quality:
    name: Code Quality
    runs-on: ubuntu-26.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check C++ formatting
        run: |
          find include src -name "*.hpp" -o -name "*.cpp" 2>/dev/null | \
          xargs -r clang-format --dry-run --Werror || { echo "::warning::C++ formatting issues detected - run clang-format to fix"; exit 0; }

  # 多平台构建
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-26.04
            compiler: gcc
            timeout_minutes: 30
          - os: macos-latest
            compiler: clang
            timeout_minutes: 30
          - os: windows-latest
            compiler: msvc
            timeout_minutes: 60
            build_parallel: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # 安装依赖
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja

      # Export GitHub Actions cache credentials so vcpkg can use the native
      # `x-gha` binary source (caches compiled packages across runs instead
      # of rebuilding yaml-cpp etc. from source every time).
      - name: Export GHA cache credentials
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # Cache installed artifacts (downloaded source/binary packages are
      # cached by x-gha above). Do NOT cache the vcpkg source tree — it is
      # managed by run-vcpkg and caching it triggers git pathspec errors.
      - name: Cache vcpkg installed
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/build/vcpkg_installed
          key: vcpkg-installed-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-installed-${{ runner.os }}-

      # Setup vcpkg (pinned commit + x-gha binary caching).
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        env:
          VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'
        with:
          vcpkgGitCommitId: 'a0b1c8d3a477c1cb4813d8e127a56961707ca42b'

      # Configure
      - name: Configure
        shell: bash
        run: |
          CMAKE_ARGS=(
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_CXX_SCAN_FOR_MODULES=OFF
            -DSHIELD_BUILD_TESTS=ON
            -DSHIELD_BUILD_EXAMPLES=ON
          )

          if [ "$RUNNER_OS" == "Windows" ]; then
            CMAKE_ARGS+=(-G "Visual Studio 18 2026" -A x64)
          else
            CMAKE_ARGS+=(-G Ninja)
          fi

          cmake -B build "${CMAKE_ARGS[@]}"

      # Build
      - name: Build
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            cmake --build build --config Release --parallel $(nproc)
          elif [ "$RUNNER_OS" == "macOS" ]; then
            cmake --build build --config Release --parallel $(sysctl -n hw.logicalcpu)
          else
            cmake --build build --config Release --parallel ${{ matrix.build_parallel }}
          fi

  # Docker 构建 (仅 main 分支)
  docker:
    name: Docker Build
    runs-on: ubuntu-26.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
