name: CI

on:
  push:
    branches: [main]
    paths:
      - 'include/**'
      - 'src/**'
      - 'tests/**'
      - 'examples/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'vcpkg.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'include/**'
      - 'src/**'
      - 'tests/**'
      - 'examples/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'vcpkg.json'
      - '.github/workflows/ci.yml'

env:
  BUILD_TYPE: Release
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache

jobs:
  # 代码质量检查
  code-quality:
    name: Code Quality
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup clang-format
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/jammy/ llvm-toolchain-jammy-18 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-format-18
          sudo ln -sf /usr/bin/clang-format-18 /usr/local/bin/clang-format

      - name: Check C++ formatting
        run: |
          find include src -name "*.hpp" -o -name "*.cpp" | \
          xargs clang-format --dry-run --Werror

  # 多平台构建
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            compiler: gcc
            build_type: Release
          - os: ubuntu-22.04
            compiler: gcc
            build_type: Debug
          - os: ubuntu-22.04
            compiler: clang
            build_type: Release
          - os: macos-latest
            compiler: clang
            build_type: Release
          - os: windows-latest
            compiler: msvc
            build_type: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      # 安装依赖
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja

      # 安装 CMake
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.0'

      # vcpkg 缓存
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg
            build/vcpkg_installed
          key: vcpkg-${{ matrix.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.os }}-

      # Setup vcpkg
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'f7423ee180c4b7f40d43402c2feb3859161ef625'

      # Configure
      - name: Configure
        shell: bash
        run: |
          CMAKE_ARGS=(
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
            -DSHIELD_BUILD_TESTS=ON
            -DSHIELD_BUILD_EXAMPLES=ON
          )

          if [ "${{ runner.os }}" == "Windows" ]; then
            CMAKE_ARGS+=(-G "Visual Studio 17 2022" -A x64)
          else
            CMAKE_ARGS+=(-G Ninja)
          fi

          cmake -B build "${CMAKE_ARGS[@]}"

      # Build
      - name: Build
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Linux" ]; then
            cmake --build build --config ${{ matrix.build_type }} --parallel $(nproc)
          elif [ "${{ runner.os }}" == "macOS" ]; then
            cmake --build build --config ${{ matrix.build_type }} --parallel $(sysctl -n hw.logicalcpu)
          else
            cmake --build build --config ${{ matrix.build_type }} --parallel
          fi

      # Test (可选，因为项目可能还没有完整测试)
      - name: Test
        if: false  # 暂时禁用，等测试完善后启用
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            cd build
            ctest --build-config ${{ matrix.build_type }} --output-on-failure
          else
            cd build
            ctest --output-on-failure
          fi

  # Docker 构建 (仅 main 分支)
  docker:
    name: Docker Build
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
