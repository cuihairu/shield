# Multi-node game server template — Logic node
# Run: shield server --config templates/multi-node/config/logic.yaml
# This node runs game logic (Lua actors). No network listeners.

app:
  name: "Shield Logic Node"
  version: "1.0.0"

log:
  global_level: "info"
  console:
    enabled: true

server:
  host: "0.0.0.0"
  port: 9090

lua:
  script_dir: "templates/multi-node/scripts/"
  auto_reload: true
  preload_scripts:
    - "logic_init.lua"

# No gateway listeners — logic nodes only receive forwarded messages
gateway:
  tcp:
    enabled: false
  http:
    enabled: false
  websocket:
    enabled: false

# Listen for inter-node messages
discovery:
  type: "static"
  self_id: "logic-1"
  nodes: []
