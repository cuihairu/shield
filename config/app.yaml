# Shield default Phase 1 runtime configuration.

app:
  name: shield
  version: "0.1.0"

log:
  level: info
  console: true

lua:
  vm:
    mode: per_service
    max_vms: 128
    max_memory_mb: 64
  sandbox:
    allow_os: false
    allow_io: false
  script_path: "scripts"
  module_path: "scripts/?.lua;scripts/?/init.lua"
  cache:
    enabled: true
    max_size: 100
    ttl_seconds: 0

actors:
  - name: bootstrap
    script: ../scripts/bootstrap.lua
    instances: 1
    required: true

# Plugin system v1 (see docs/plugin-system.md).
# `required: false` so configs without a built plugin still boot. Business Lua
# accesses plugins through binding names such as database.default.
#
# Redis driver example (uncomment when redis.driver is built):
#   - id: redis.main
#     package: redis.driver
#     required: true
#     config:
#       host: 127.0.0.1
#       port: 6379
#       pool_size: 16
#   - id: cache.session
#     package: cache.redis
#     required: false
#     dependencies:
#       redis: redis.main
#   bindings:
#     redis.default: redis.main
#     cache.default: cache.session
plugins:
  directory: "./plugins"
  instances:
    - id: db.main
      package: database.sqlite
      required: false
      config:
        database: ":memory:"
  bindings:
    database.default: db.main

bootstrap:
  timeout:
    config_load: 5000
    log_init: 5000
    core_init: 10000
    plugin_init: 30000
    net_init: 10000
    script_init: 10000
    service_spawn: 60000

shutdown:
  timeout:
    service_drain: 30000
    service_stop: 10000
    plugin_shutdown: 10000
    total: 60000
