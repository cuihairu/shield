# Shield Game Framework - Base Configuration
# app.yaml - Default configuration

# Application settings
app:
  name: "Shield Game Framework"
  version: "0.1.0"
  show_banner: true

# Log module configuration
log:
  global_level: "info"
  console:
    enabled: true
    colored: true
    pattern: "[%Y-%m-%d %H:%M:%S.%f] [%t] [%l] %v"
    min_level: "info"
  file:
    enabled: false
    log_file: "logs/shield.log"
    max_file_size: 10485760  # 10MB
    max_files: 5
    rotate_on_open: false
    pattern: "[%Y-%m-%d %H:%M:%S.%f] [%t] [%l] %v"
    min_level: "debug"

# Server configuration
server:
  host: "localhost"
  port: 8080
  max_connections: 1000

# Database configuration
database:
  host: "localhost"
  port: 5432
  name: "shield_db"
  username: "shield"
  password: "password"
  
# Game logic configuration (for Lua scripts)
game:
  max_players: 100
  world_size: 1000
  spawn_points:
    - [0, 0, 0]
    - [100, 0, 100]
  difficulty: "normal"
  
# Lua scripts configuration
lua:
  script_dir: "scripts/"
  auto_reload: true
  preload_scripts:
    - "init.lua"
    - "game_logic.lua"
