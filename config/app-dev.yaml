# Development Environment Configuration
# app-dev.yaml - Development environment configuration overrides

# Override logger for development
log:
  global_level: "debug"
  console:
    enabled: true
  file:
    enabled: true

# Database for development
database:
  host: "localhost"
  name: "shield_dev"
  username: "dev_user"
  password: "dev_password"

# Server settings for development
server:
  port: 8080
  max_connections: 10

# Development game settings
game:
  max_players: 5
  difficulty: "easy"
  
# Lua settings for development
lua:
  auto_reload: true
  debug_mode: true
  script_path: "scripts"
  module_path: "scripts/?.lua;scripts/?/init.lua"
  cache:
    enabled: false  # 开发环境禁用缓存以便热重载
    max_size: 50
    ttl_seconds: 300
