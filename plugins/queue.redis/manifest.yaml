schema_version: 1
id: queue.redis
name: Redis Pub/Sub
version: 1.0.0
kind: queue
description: Redis pub/sub provider for shield.queue.v1
documentation:
  url: https://cuihairu.github.io/shield/plugins/queue-redis
  description: Redis pub/sub provider for the shield.queue.v1 interface
entry: shield_plugin_get_v1
library:
  windows: bin/libshield_queue_redis.dll
  linux: bin/libshield_queue_redis.so
  macos: bin/libshield_queue_redis.dylib
provides:
  - interface: shield.queue.v1
    capabilities:
      - pubsub
requires:
  - name: redis
    interface: shield.redis.v1
    optional: true
lua:
  namespace: queue.redis
  search_paths: []
config_schema:
  type: object
  required:
    - host
  properties:
    host:
      type: string
      default: 127.0.0.1
    port:
      type: integer
      default: 6379
      minimum: 1
      maximum: 65535
    password:
      type: string
      secret: true
    db:
      type: integer
      default: 0
      minimum: 0
      maximum: 15
    connect_timeout_ms:
      type: integer
      default: 5000
      minimum: 100
      maximum: 60000
    command_timeout_ms:
      type: integer
      default: 1000
      minimum: 100
      maximum: 60000
