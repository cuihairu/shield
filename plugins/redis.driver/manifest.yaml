schema_version: 1
id: redis.driver
name: Redis Driver
version: 1.0.0
kind: redis
description: Unified Redis driver providing shield.redis.v1 typed interface, pipeline, and raw command
documentation:
  url: https://cuihairu.github.io/shield/plugins/redis-driver
  description: Unified Redis driver with connection pool, typed commands, pipeline, and raw command fallback
entry: shield_plugin_get_v1
library:
  windows: bin/libshield_redis_driver.dll
  linux: bin/libshield_redis_driver.so
  macos: bin/libshield_redis_driver.dylib
provides:
  - interface: shield.redis.v1
    capabilities:
      - typed-command
      - pipeline
      - raw-command
requires: []
lua:
  namespace: redis
  search_paths: []
config_schema:
  type: object
  required:
    - host
  properties:
    mode:
      type: string
      default: single
    host:
      type: string
      default: 127.0.0.1
    port:
      type: integer
      default: 6379
      minimum: 1
      maximum: 65535
    password:
      type: string
      secret: true
    db:
      type: integer
      default: 0
      minimum: 0
      maximum: 15
    pool_size:
      type: integer
      default: 8
      minimum: 1
      maximum: 256
    connect_timeout_ms:
      type: integer
      default: 5000
      minimum: 100
      maximum: 60000
    command_timeout_ms:
      type: integer
      default: 3000
      minimum: 100
      maximum: 60000
