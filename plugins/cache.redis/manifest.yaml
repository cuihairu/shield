schema_version: 1
id: cache.redis
name: Redis Cache
version: 1.0.0
kind: cache
description: Redis-backed provider for shield.cache.v1 (key/value + hash)
documentation:
  url: https://cuihairu.github.io/shield/plugins/cache-redis
  description: Redis-backed provider for the shield.cache.v1 interface (key-value, hash, TTL, counters)
entry: shield_plugin_get_v1
library:
  windows: bin/libshield_cache_redis.dll
  linux: bin/libshield_cache_redis.so
  macos: bin/libshield_cache_redis.dylib
provides:
  - interface: shield.cache.v1
    capabilities:
      - kv
      - hash
      - ttl
      - counter
requires: []
lua:
  namespace: cache.redis
  search_paths: []
config_schema:
  type: object
  required:
    - host
  properties:
    host:
      type: string
      default: 127.0.0.1
    port:
      type: integer
      default: 6379
      minimum: 1
      maximum: 65535
    password:
      type: string
      secret: true
    db:
      type: integer
      default: 0
      minimum: 0
      maximum: 15
    pool_size:
      type: integer
      default: 8
      minimum: 1
      maximum: 256
    connect_timeout_ms:
      type: integer
      default: 5000
      minimum: 100
      maximum: 60000
    command_timeout_ms:
      type: integer
      default: 5000
      minimum: 100
      maximum: 60000
