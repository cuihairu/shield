schema_version: 1
id: health.http
name: HTTP Health Endpoint
version: 1.0.0
kind: health
description: HTTP health/readiness provider for shield.health.v1 (boost::beast)
documentation:
  url: https://cuihairu.github.io/shield/plugins/health-http
  description: HTTP health/readiness provider for the shield.health.v1 interface (Kubernetes-compatible probes)
entry: shield_plugin_get_v1
library:
  windows: bin/libshield_health_http.dll
  linux: bin/libshield_health_http.so
  macos: bin/libshield_health_http.dylib
provides:
  - interface: shield.health.v1
    capabilities:
      - http
      - k8s_probes
requires: []
config_schema:
  type: object
  properties:
    bind_address:
      type: string
      default: 0.0.0.0
    port:
      type: integer
      default: 8086
      minimum: 1
      maximum: 65535
    liveness_path:
      type: string
      default: /health
    readiness_path:
      type: string
      default: /ready
